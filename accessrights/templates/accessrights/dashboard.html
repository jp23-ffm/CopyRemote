{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Control — Permission Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'accessrights/css/dashboard.css' %}">
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <h1><span class="dot"></span> Access Control</h1>
    <div class="header-actions">
      <span class="theme-label">DARK</span>
      <div class="theme-toggle" onclick="toggleTheme()"><div class="knob"></div></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab(this,'perms')">Permissions</button>
    <button class="tab" onclick="switchTab(this,'log')">Audit Log</button>
  </div>

  <!-- Permissions tab -->
  <div id="panel-perms">
    <div class="toolbar">
      <div class="search-wrap">
        <span class="ico">⌕</span>
        <input type="text" id="searchInput" placeholder="Search users..." oninput="render()">
      </div>
      <span class="config-info" id="configInfo">Loading...</span>
    </div>

    <div id="loading" class="loading">
      <span class="spinner"></span> Loading permissions...
    </div>

    <div class="panel">
      <div class="tbl-scroll">
        <table>
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Audit log tab -->
  <div id="panel-log" style="display:none">
    <div class="log-list" id="logList">
      <div class="log-empty">No changes recorded yet.</div>
    </div>
  </div>

</div>

<!-- Save bar -->
<div class="save-bar" id="saveBar">
  <div class="save-info"><strong id="cnt">0</strong> unsaved change(s)</div>
  <div class="save-actions">
    <button class="btn btn-ghost" onclick="discard()">Discard</button>
    <button class="btn btn-accent" onclick="save()">Save changes</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Config: pass Django URLs and CSRF token to JS -->
<script>
  const CONFIG_URL  = "{% url 'accessrights:config' %}";
  const UPDATE_URL  = "{% url 'accessrights:update' %}";
  const AUDIT_URL   = "{% url 'accessrights:audit_log' %}";
  const CSRF_TOKEN  = "{{ csrf_token }}";
</script>
<script src="{% static 'accessrights/js/dashboard.js' %}"></script>

</body>
</html>
