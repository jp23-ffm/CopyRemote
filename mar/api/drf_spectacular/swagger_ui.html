<!DOCTYPE html>
<html>
  <head>
    {% block head %}
    <title>{{ title|default:"Swagger" }}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% if favicon_href %}<link rel="icon" href="{{ favicon_href }}">{% endif %}
    <link rel="stylesheet" href="{{ swagger_ui_css }}">
    <style>
      html { box-sizing: border-box; overflow-y: scroll; }
      *, *:after, *:before { box-sizing: inherit; }
      body { background: #fafafa; margin: 0; }
      .qb-back-link {
        position: fixed;
        top: 10px;
        right: 16px;
        z-index: 1000;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        text-decoration: none;
        color: #A0826D;
        background: #fff;
        border: 1px solid #dee2e6;
        border-radius: 20px;
        padding: 4px 12px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      }
      .qb-back-link:hover { border-color: #A0826D; }
    </style>
    {% endblock head %}
  </head>
  <body>
    {% block body %}
    <a class="qb-back-link" href="{% url 'api:query_builder' %}">← Query Builder</a>
    <div id="swagger-ui"></div>
    <script src="{{ swagger_ui_bundle }}"></script>
    <script src="{{ swagger_ui_standalone }}"></script>
    {% if script_url %}
    <script src="{{ script_url }}"></script>
    {% else %}
    <script>
    {% include template_name_js %}
    </script>
    {% endif %}
    {% endblock %}
  </body>
</html>
